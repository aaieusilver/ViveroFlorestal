<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MTECa - Simulação Técnica de Produção de Mudas: painel técnico-operacional para viveiro florestal." />
    <title>MTECa | Simulação Técnica de Produção de Mudas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Navegação principal">
        <div class="brand">
          <div class="brand-mark">MT</div>
          <div>
            <strong>MTECa</strong>
            <span>Simulação Técnica</span>
          </div>
        </div>

        <nav class="nav-list" id="navList"></nav>

        <div class="scenario-chip">
          <span class="pulse"></span>
          Cenário base ativo
        </div>
      </aside>

      <main class="main-content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Viveiro Florestal • Cáceres-MT</p>
            <h1 id="pageTitle">Painel Geral</h1>
          </div>
          <div class="top-actions">
            <button class="ghost-btn" id="presentationBtn" type="button">Modo apresentação</button>
            <button class="primary-btn" id="exportBtn" type="button">Exportar cenário</button>
          </div>
        </header>

        <section id="app" class="content-area" aria-live="polite"></section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
  </body>
</html>
